name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: ./backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: backend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-

      - name: Pre-download mongodb-memory-server binary
        run: node -e "require('mongodb-memory-server').MongoMemoryServer.create().then(s => s.stop())"

      - name: Run e2e tests
        run: pnpm run test:e2e
        env:
          JWT_SECRET: "test"
          OUR_ENV: "dev"
